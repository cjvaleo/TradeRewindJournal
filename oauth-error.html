<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Something went wrong — Rewind</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root{
    --n-bg:#0a0a0a;
    --n-surface:#121212;
    --n-border:rgba(255,255,255,0.06);
    --n-border-2:rgba(255,255,255,0.10);
    --n-text:#f5f5f5;
    --n-text-2:#e8e7e2;
    --n-text-3:#dbdad5;
    --n-text-4:#d6d5d0;
    --n-chrome:linear-gradient(135deg,#f5f5f5 0%,#c8c8c8 35%,#ffffff 50%,#b8b8b8 65%,#e5e5e5 100%);
    --n-loss:#c95f5f;
    --n-font-display:'Instrument Serif',Georgia,serif;
    --n-font-sans:'Geist',system-ui,sans-serif;
    --n-font-mono:'Geist Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;min-height:100%;background:var(--n-bg);color:var(--n-text);font-family:var(--n-font-sans);-webkit-font-smoothing:antialiased}
  body{display:grid;place-items:center;padding:48px 20px}
  .card{max-width:480px;width:100%;text-align:center}
  .tag{font-family:var(--n-font-mono);font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--n-loss);margin-bottom:20px}
  h1{font-family:var(--n-font-display);font-style:italic;font-weight:400;font-size:44px;line-height:1.1;margin:0 0 14px;letter-spacing:-0.01em}
  .lead{font-family:var(--n-font-sans);font-size:15px;color:var(--n-text-2);line-height:1.55;margin:0 0 32px;letter-spacing:-0.005em}
  .cta{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 36px;border:0;border-radius:7px;background:var(--n-chrome);color:#0a0a0a;font-family:var(--n-font-sans);font-size:13px;font-weight:600;letter-spacing:-0.005em;text-decoration:none;cursor:pointer;box-shadow:inset 0 1px 0 rgba(255,255,255,0.5),inset 0 -1px 0 rgba(0,0,0,0.15),0 1px 3px rgba(0,0,0,0.5);transition:transform .08s}
  .cta:hover{transform:translateY(-0.5px)}
  .cta:active{transform:translateY(0.5px)}
  .foot{margin-top:36px;padding-top:20px;border-top:1px solid var(--n-border);font-family:var(--n-font-mono);font-size:9.5px;letter-spacing:0.15em;text-transform:uppercase;color:var(--n-text-4)}
  .foot a{color:var(--n-text-3);text-decoration:none}
  .foot a:hover{color:var(--n-text-2)}
  .code{margin-top:14px;font-family:var(--n-font-mono);font-size:9.5px;letter-spacing:0.15em;text-transform:uppercase;color:var(--n-text-4)}
  @media (max-width:520px){h1{font-size:34px}}
</style>
</head>
<body>
<main class="card">
  <div class="tag">Discord OAuth · failed</div>
  <h1 id="title">Something went wrong.</h1>
  <p class="lead" id="msg">We couldn't complete the Discord sign-in. Please try again.</p>
  <a class="cta" href="/index-6_22.html">Try again</a>
  <div class="code" id="reason-code"></div>
  <div class="foot">Still stuck? <a href="mailto:cjvaleo@gmail.com">cjvaleo@gmail.com</a></div>
</main>
<script>
  (function(){
    var p = new URLSearchParams(location.search);
    var reason = p.get('reason') || 'unknown';
    var copy = {
      access_denied:     { t: 'No problem — you cancelled.',     m: 'You backed out of the Discord sign-in. Try again whenever you’re ready.' },
      token_revoked:     { t: 'Discord link expired.',           m: 'Your Discord OAuth grant was revoked or has expired. Re-link to continue.' },
      role_check_failed: { t: 'Couldn’t check your roles.', m: 'We reached Discord but the role check didn’t complete cleanly. Wait a minute and try again.' },
      profile_missing:   { t: 'Account not found.',              m: 'Your Rewind profile wasn’t found. If you just signed up, refresh and try again.' },
      unknown:           { t: 'Something went wrong.',           m: 'We couldn’t complete the Discord sign-in. Please try again.' }
    };
    var c = copy[reason] || copy.unknown;
    document.getElementById('title').textContent = c.t;
    document.getElementById('msg').textContent   = c.m;
    document.getElementById('reason-code').textContent = 'reason: ' + reason;
  })();
</script>
<footer style="padding:24px;text-align:center;font-family:'Geist Mono',monospace;font-size:9.5px;letter-spacing:0.16em;text-transform:uppercase;color:rgba(255,255,255,0.3);border-top:1px solid rgba(255,255,255,0.06);margin-top:auto">
  &copy; 2026 Rewind
  <span style="user-select:none">&middot;</span>
  <a href="/terms" target="_blank" rel="noopener" style="color:rgba(255,255,255,0.4);text-decoration:none">Terms</a>
  <span style="user-select:none">&middot;</span>
  <a href="/privacy" target="_blank" rel="noopener" style="color:rgba(255,255,255,0.4);text-decoration:none">Privacy</a>
  <span style="user-select:none">&middot;</span>
  <a href="/refund" target="_blank" rel="noopener" style="color:rgba(255,255,255,0.4);text-decoration:none">Refund</a>
</footer>
</body>
</html>
